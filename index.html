<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joel vs Joshua FIFA Tournament</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at center, #7b0024, #24000d 80%);
      color: white;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 30px 15px 10px;
    }

    header h1 {
      margin: 0;
      font-size: 34px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    header p {
      margin-top: 8px;
      font-size: 16px;
      color: #ddd;
    }

    .trophy {
      font-size: 60px;
      margin-top: 10px;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 20px auto;
      padding: 0 15px;
    }

    .tab-button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.15);
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
      border: 1px solid rgba(255,255,255,0.3);
    }

    .tab-button.active {
      background: #00e0d5;
      color: #111;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .bracket-wrapper {
      width: 100%;
      overflow-x: auto;
      padding: 25px;
    }

    .bracket {
      min-width: 1100px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
      gap: 30px;
      align-items: center;
    }

    .round {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .round h2 {
      text-align: center;
      font-size: 15px;
      margin: 0 0 10px;
      text-transform: uppercase;
      color: #00e0d5;
      letter-spacing: 1px;
    }

    .match {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 8px;
      padding: 12px;
      min-height: 118px;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }

    .team-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .team-row:last-child {
      margin-bottom: 0;
    }

    .flag {
      width: 32px;
      text-align: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    select,
    input {
      width: 100%;
      padding: 8px;
      border-radius: 5px;
      border: none;
      font-size: 14px;
      outline: none;
    }

    select {
      background: white;
      color: #111;
    }

    .center-area {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 20px;
      justify-content: center;
      align-items: center;
    }

    .final-box {
      width: 100%;
      background: rgba(255, 215, 0, 0.15);
      border: 2px solid gold;
      border-radius: 10px;
      padding: 18px;
    }

    .champion {
      background: linear-gradient(135deg, #ffd700, #b8860b);
      color: #24000d;
      font-weight: bold;
      padding: 18px;
      border-radius: 12px;
      width: 100%;
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.5);
    }

    .champion h2 {
      margin: 0 0 12px;
      color: #24000d;
    }

    .player-section,
    .scorer-section {
      max-width: 1000px;
      margin: 20px auto 40px;
      padding: 20px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 12px;
    }

    .player-section h2,
    .scorer-section h2 {
      text-align: center;
      margin-top: 0;
      color: #00e0d5;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .player-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }

    .player-card {
      background: rgba(0,0,0,0.25);
      padding: 15px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.25);
    }

    .player-card label {
      display: block;
      font-size: 13px;
      margin: 8px 0 5px;
      color: #ddd;
    }

    .scorer-table-wrapper {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 700px;
      margin-top: 15px;
    }

    th,
    td {
      border: 1px solid rgba(255,255,255,0.25);
      padding: 10px;
      text-align: center;
    }

    th {
      background: rgba(0, 224, 213, 0.25);
      color: white;
      text-transform: uppercase;
      font-size: 13px;
      letter-spacing: 1px;
    }

    td {
      background: rgba(0,0,0,0.25);
    }

    td input,
    td select {
      text-align: center;
    }

    .buttons {
      text-align: center;
      margin: 20px 0 40px;
    }

    button {
      padding: 12px 22px;
      border: none;
      border-radius: 8px;
      background: #00e0d5;
      color: #111;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
      margin: 5px;
    }

    button:hover {
      background: #00fff2;
    }

    .danger-button {
      background: #ff4d6d;
      color: white;
    }

    .danger-button:hover {
      background: #ff6f89;
    }

    @media (max-width: 700px) {
      header h1 {
        font-size: 25px;
      }

      .player-grid {
        grid-template-columns: 1fr;
      }

      .bracket-wrapper {
        padding: 15px;
      }

      .tabs {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>Road to Final</h1>
    <p>Joel vs Joshua FIFA Tournament</p>
    <div class="trophy">🏆</div>
  </header>

  <div class="tabs">
    <button class="tab-button active" onclick="openTab('tournamentTab', this)">Tournament Bracket</button>
    <button class="tab-button" onclick="openTab('scorerTab', this)">Top Scorers</button>
  </div>

  <!-- TOURNAMENT TAB -->
  <div id="tournamentTab" class="tab-content active">

    <div class="bracket-wrapper">
      <div class="bracket">

        <div class="round">
          <h2>Quarter Finals</h2>

          <div class="match">
            <div class="team-row">
              <span class="flag" id="flag-team1"></span>
              <select id="team1" onchange="updateFlag('team1')"></select>
            </div>
            <div class="team-row">
              <span class="flag" id="flag-team2"></span>
              <select id="team2" onchange="updateFlag('team2')"></select>
            </div>
          </div>

          <div class="match">
            <div class="team-row">
              <span class="flag" id="flag-team3"></span>
              <select id="team3" onchange="updateFlag('team3')"></select>
            </div>
            <div class="team-row">
              <span class="flag" id="flag-team4"></span>
              <select id="team4" onchange="updateFlag('team4')"></select>
            </div>
          </div>

          <div class="match">
            <div class="team-row">
              <span class="flag" id="flag-team5"></span>
              <select id="team5" onchange="updateFlag('team5')"></select>
            </div>
            <div class="team-row">
              <span class="flag" id="flag-team6"></span>
              <select id="team6" onchange="updateFlag('team6')"></select>
            </div>
          </div>

          <div class="match">
            <div class="team-row">
              <span class="flag" id="flag-team7"></span>
              <select id="team7" onchange="updateFlag('team7')"></select>
            </div>
            <div class="team-row">
              <span class="flag" id="flag-team8"></span>
              <select id="team8" onchange="updateFlag('team8')"></select>
            </div>
          </div>
        </div>

        <div class="round">
          <h2>Semi Finalists</h2>

          <div class="match">
            <div class="team-row">
              <span class="flag" id="flag-semi1"></span>
              <select id="semi1" onchange="updateFlag('semi1')"></select>
            </div>
            <div class="team-row">
              <span class="flag" id="flag-semi2"></span>
              <select id="semi2" onchange="updateFlag('semi2')"></select>
            </div>
          </div>

          <div class="match">
            <div class="team-row">
              <span class="flag" id="flag-semi3"></span>
              <select id="semi3" onchange="updateFlag('semi3')"></select>
            </div>
            <div class="team-row">
              <span class="flag" id="flag-semi4"></span>
              <select id="semi4" onchange="updateFlag('semi4')"></select>
            </div>
          </div>
        </div>

        <div class="center-area">
          <div class="final-box">
            <h2>Final</h2>

            <div class="team-row">
              <span class="flag" id="flag-final1"></span>
              <select id="final1" onchange="updateFlag('final1')"></select>
            </div>

            <div class="team-row">
              <span class="flag" id="flag-final2"></span>
              <select id="final2" onchange="updateFlag('final2')"></select>
            </div>
          </div>

          <div class="champion">
            <h2>Champion</h2>
            <div class="team-row">
              <span class="flag" id="flag-champion"></span>
              <select id="champion" onchange="updateFlag('champion')"></select>
            </div>
          </div>
        </div>

        <div class="round">
          <h2>Finalists</h2>

          <div class="match">
            <div class="team-row">
              <span class="flag" id="flag-finalist1"></span>
              <select id="finalist1" onchange="updateFlag('finalist1')"></select>
            </div>
          </div>

          <div class="match">
            <div class="team-row">
              <span class="flag" id="flag-finalist2"></span>
              <select id="finalist2" onchange="updateFlag('finalist2')"></select>
            </div>
          </div>
        </div>

        <div class="round">
          <h2>Scores</h2>

          <div class="match">
            <input id="score1" placeholder="Quarter Final Scores" oninput="saveData()" />
          </div>

          <div class="match">
            <input id="score2" placeholder="Semi Final Scores" oninput="saveData()" />
          </div>

          <div class="match">
            <input id="score3" placeholder="Final Score" oninput="saveData()" />
          </div>
        </div>

      </div>
    </div>

    <section class="player-section">
      <h2>Players and Teams</h2>

      <div class="player-grid">
        <div class="player-card">
          <h3>Player 1</h3>

          <label>Player Name</label>
          <input id="player1Name" value="Joel" oninput="saveData()" />

          <label>Team Picked</label>
          <input id="player1Team" placeholder="Example: Argentina, France, Brazil..." oninput="saveData()" />
        </div>

        <div class="player-card">
          <h3>Player 2</h3>

          <label>Player Name</label>
          <input id="player2Name" value="Joshua" oninput="saveData()" />

          <label>Team Picked</label>
          <input id="player2Team" placeholder="Example: Portugal, England, Spain..." oninput="saveData()" />
        </div>
      </div>
    </section>

  </div>

  <!-- TOP SCORER TAB -->
  <div id="scorerTab" class="tab-content">

    <section class="scorer-section">
      <h2>Top Scorer List</h2>

      <div class="scorer-table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Rank</th>
              <th>Scorer Name</th>
              <th>Country / Team</th>
              <th>Goals</th>
              <th>Owned By</th>
            </tr>
          </thead>

          <tbody>
            <tr>
              <td>1</td>
              <td><input id="scorer1Name" placeholder="Player name" oninput="saveData()" /></td>
              <td>
                <div class="team-row">
                  <span class="flag" id="flag-scorer1Team"></span>
                  <select id="scorer1Team" onchange="updateFlag('scorer1Team')"></select>
                </div>
              </td>
              <td><input id="scorer1Goals" type="number" min="0" placeholder="0" oninput="saveData()" /></td>
              <td><input id="scorer1Owner" placeholder="Joel or Joshua" oninput="saveData()" /></td>
            </tr>

            <tr>
              <td>2</td>
              <td><input id="scorer2Name" placeholder="Player name" oninput="saveData()" /></td>
              <td>
                <div class="team-row">
                  <span class="flag" id="flag-scorer2Team"></span>
                  <select id="scorer2Team" onchange="updateFlag('scorer2Team')"></select>
                </div>
              </td>
              <td><input id="scorer2Goals" type="number" min="0" placeholder="0" oninput="saveData()" /></td>
              <td><input id="scorer2Owner" placeholder="Joel or Joshua" oninput="saveData()" /></td>
            </tr>

            <tr>
              <td>3</td>
              <td><input id="scorer3Name" placeholder="Player name" oninput="saveData()" /></td>
              <td>
                <div class="team-row">
                  <span class="flag" id="flag-scorer3Team"></span>
                  <select id="scorer3Team" onchange="updateFlag('scorer3Team')"></select>
                </div>
              </td>
              <td><input id="scorer3Goals" type="number" min="0" placeholder="0" oninput="saveData()" /></td>
              <td><input id="scorer3Owner" placeholder="Joel or Joshua" oninput="saveData()" /></td>
            </tr>

            <tr>
              <td>4</td>
              <td><input id="scorer4Name" placeholder="Player name" oninput="saveData()" /></td>
              <td>
                <div class="team-row">
                  <span class="flag" id="flag-scorer4Team"></span>
                  <select id="scorer4Team" onchange="updateFlag('scorer4Team')"></select>
                </div>
              </td>
              <td><input id="scorer4Goals" type="number" min="0" placeholder="0" oninput="saveData()" /></td>
              <td><input id="scorer4Owner" placeholder="Joel or Joshua" oninput="saveData()" /></td>
            </tr>

            <tr>
              <td>5</td>
              <td><input id="scorer5Name" placeholder="Player name" oninput="saveData()" /></td>
              <td>
                <div class="team-row">
                  <span class="flag" id="flag-scorer5Team"></span>
                  <select id="scorer5Team" onchange="updateFlag('scorer5Team')"></select>
                </div>
              </td>
              <td><input id="scorer5Goals" type="number" min="0" placeholder="0" oninput="saveData()" /></td>
              <td><input id="scorer5Owner" placeholder="Joel or Joshua" oninput="saveData()" /></td>
            </tr>

            <tr>
              <td>6</td>
              <td><input id="scorer6Name" placeholder="Player name" oninput="saveData()" /></td>
              <td>
                <div class="team-row">
                  <span class="flag" id="flag-scorer6Team"></span>
                  <select id="scorer6Team" onchange="updateFlag('scorer6Team')"></select>
                </div>
              </td>
              <td><input id="scorer6Goals" type="number" min="0" placeholder="0" oninput="saveData()" /></td>
              <td><input id="scorer6Owner" placeholder="Joel or Joshua" oninput="saveData()" /></td>
            </tr>

            <tr>
              <td>7</td>
              <td><input id="scorer7Name" placeholder="Player name" oninput="saveData()" /></td>
              <td>
                <div class="team-row">
                  <span class="flag" id="flag-scorer7Team"></span>
                  <select id="scorer7Team" onchange="updateFlag('scorer7Team')"></select>
                </div>
              </td>
              <td><input id="scorer7Goals" type="number" min="0" placeholder="0" oninput="saveData()" /></td>
              <td><input id="scorer7Owner" placeholder="Joel or Joshua" oninput="saveData()" /></td>
            </tr>

            <tr>
              <td>8</td>
              <td><input id="scorer8Name" placeholder="Player name" oninput="saveData()" /></td>
              <td>
                <div class="team-row">
                  <span class="flag" id="flag-scorer8Team"></span>
                  <select id="scorer8Team" onchange="updateFlag('scorer8Team')"></select>
                </div>
              </td>
              <td><input id="scorer8Goals" type="number" min="0" placeholder="0" oninput="saveData()" /></td>
              <td><input id="scorer8Owner" placeholder="Joel or Joshua" oninput="saveData()" /></td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

  </div>

  <div class="buttons">
    <button onclick="saveData()">Save Tournament</button>
    <button class="danger-button" onclick="resetTournament()">Reset</button>
  </div>

  <script>
    const countries = [
      { name: "Select Team", flag: "⚽" },
      { name: "Argentina", flag: "🇦🇷" },
      { name: "Brazil", flag: "🇧🇷" },
      { name: "France", flag: "🇫🇷" },
      { name: "Portugal", flag: "🇵🇹" },
      { name: "England", flag: "🏴" },
      { name: "Spain", flag: "🇪🇸" },
      { name: "Germany", flag: "🇩🇪" },
      { name: "Netherlands", flag: "🇳🇱" },
      { name: "Italy", flag: "🇮🇹" },
      { name: "Belgium", flag: "🇧🇪" },
      { name: "Croatia", flag: "🇭🇷" },
      { name: "Morocco", flag: "🇲🇦" },
      { name: "USA", flag: "🇺🇸" },
      { name: "Mexico", flag: "🇲🇽" },
      { name: "Japan", flag: "🇯🇵" },
      { name: "South Korea", flag: "🇰🇷" },
      { name: "Ghana", flag: "🇬🇭" },
      { name: "Senegal", flag: "🇸🇳" },
      { name: "Switzerland", flag: "🇨🇭" },
      { name: "Poland", flag: "🇵🇱" },
      { name: "Uruguay", flag: "🇺🇾" },
      { name: "Colombia", flag: "🇨🇴" },
      { name: "Canada", flag: "🇨🇦" },
      { name: "Denmark", flag: "🇩🇰" }
    ];

    const selectIds = [
      "team1", "team2", "team3", "team4", "team5", "team6", "team7", "team8",
      "semi1", "semi2", "semi3", "semi4",
      "final1", "final2",
      "champion",
      "finalist1", "finalist2",
      "scorer1Team", "scorer2Team", "scorer3Team", "scorer4Team",
      "scorer5Team", "scorer6Team", "scorer7Team", "scorer8Team"
    ];

    const inputIds = [
      "score1", "score2", "score3",
      "player1Name", "player1Team",
      "player2Name", "player2Team",

      "scorer1Name", "scorer1Goals", "scorer1Owner",
      "scorer2Name", "scorer2Goals", "scorer2Owner",
      "scorer3Name", "scorer3Goals", "scorer3Owner",
      "scorer4Name", "scorer4Goals", "scorer4Owner",
      "scorer5Name", "scorer5Goals", "scorer5Owner",
      "scorer6Name", "scorer6Goals", "scorer6Owner",
      "scorer7Name", "scorer7Goals", "scorer7Owner",
      "scorer8Name", "scorer8Goals", "scorer8Owner"
    ];

    function openTab(tabId, button) {
      const tabs = document.querySelectorAll(".tab-content");
      const buttons = document.querySelectorAll(".tab-button");

      tabs.forEach(tab => tab.classList.remove("active"));
      buttons.forEach(btn => btn.classList.remove("active"));

      document.getElementById(tabId).classList.add("active");
      button.classList.add("active");
    }

    function fillDropdowns() {
      selectIds.forEach(id => {
        const select = document.getElementById(id);
        select.innerHTML = "";

        countries.forEach(country => {
          const option = document.createElement("option");
          option.value = country.name;
          option.textContent = `${country.flag} ${country.name}`;
          select.appendChild(option);
        });
      });
    }

    function updateFlag(id) {
      const selectedTeam = document.getElementById(id).value;
      const country = countries.find(c => c.name === selectedTeam);
      const flagElement = document.getElementById(`flag-${id}`);

      if (flagElement) {
        flagElement.textContent = country ? country.flag : "⚽";
      }

      saveData();
    }

    function saveData() {
      const data = {};

      selectIds.forEach(id => {
        const element = document.getElementById(id);
        if (element) data[id] = element.value;
      });

      inputIds.forEach(id => {
        const element = document.getElementById(id);
        if (element) data[id] = element.value;
      });

      localStorage.setItem("fifaTournamentData", JSON.stringify(data));
    }

    function loadData() {
      const saved = localStorage.getItem("fifaTournamentData");

      if (!saved) {
        setDefaultTeams();
        return;
      }

      const data = JSON.parse(saved);

      selectIds.forEach(id => {
        const element = document.getElementById(id);

        if (element && data[id]) {
          element.value = data[id];
        }

        if (element) {
          updateFlag(id);
        }
      });

      inputIds.forEach(id => {
        const element = document.getElementById(id);

        if (element && data[id] !== undefined) {
          element.value = data[id];
        }
      });
    }

    function setDefaultTeams() {
      const defaults = {
        team1: "Argentina",
        team2: "USA",
        team3: "Brazil",
        team4: "Spain",
        team5: "France",
        team6: "Portugal",
        team7: "England",
        team8: "Netherlands",
        player1Name: "Joel",
        player2Name: "Joshua"
      };

      Object.keys(defaults).forEach(id => {
        const element = document.getElementById(id);
        if (element) {
          element.value = defaults[id];
        }
      });

      selectIds.forEach(id => updateFlag(id));
      saveData();
    }

    function resetTournament() {
      if (confirm("Reset the whole tournament and top scorer list?")) {
        localStorage.removeItem("fifaTournamentData");

        selectIds.forEach(id => {
          const element = document.getElementById(id);
          if (element) {
            element.value = "Select Team";
            updateFlag(id);
          }
        });

        inputIds.forEach(id => {
          const element = document.getElementById(id);
          if (element) {
            element.value = "";
          }
        });

        document.getElementById("player1Name").value = "Joel";
        document.getElementById("player2Name").value = "Joshua";

        saveData();
      }
    }

    fillDropdowns();
    loadData();
  </script>

</body>
</html>
