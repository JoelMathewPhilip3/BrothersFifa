<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joel vs Joshua FIFA Tournament</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at center, #7b0024, #24000d 80%);
      color: white;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 30px 15px 10px;
    }

    header h1 {
      margin: 0;
      font-size: 34px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    header p {
      margin-top: 8px;
      color: #ddd;
    }

    .trophy {
      font-size: 60px;
      margin-top: 10px;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 20px auto;
      padding: 0 15px;
    }

    .tab-button {
      padding: 12px 24px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.15);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .tab-button.active {
      background: #00e0d5;
      color: #111;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .bracket-wrapper {
      width: 100%;
      overflow-x: auto;
      padding: 25px;
    }

    .bracket {
      min-width: 1100px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
      gap: 30px;
      align-items: center;
    }

    .round {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .round h2,
    .player-section h2,
    .scorer-section h2 {
      text-align: center;
      color: #00e0d5;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .round h2 {
      font-size: 15px;
      margin: 0 0 10px;
    }

    .match {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 8px;
      padding: 12px;
      min-height: 118px;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }

    .team-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .team-row:last-child {
      margin-bottom: 0;
    }

    .team-icon {
      width: 34px;
      height: 34px;
      min-width: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 23px;
      background: rgba(255,255,255,0.12);
      border-radius: 50%;
      overflow: hidden;
    }

    .team-icon img {
      width: 26px;
      height: 26px;
      object-fit: contain;
      display: block;
    }

    select,
    input {
      width: 100%;
      padding: 8px;
      border-radius: 5px;
      border: none;
      font-size: 14px;
      outline: none;
    }

    .center-area {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 20px;
      justify-content: center;
      align-items: center;
    }

    .final-box {
      width: 100%;
      background: rgba(255,215,0,0.15);
      border: 2px solid gold;
      border-radius: 10px;
      padding: 18px;
    }

    .champion {
      background: linear-gradient(135deg, #ffd700, #b8860b);
      color: #24000d;
      font-weight: bold;
      padding: 18px;
      border-radius: 12px;
      width: 100%;
      box-shadow: 0 0 25px rgba(255,215,0,0.5);
    }

    .champion h2 {
      margin: 0 0 12px;
      color: #24000d;
    }

    .player-section,
    .scorer-section {
      max-width: 1050px;
      margin: 20px auto 40px;
      padding: 20px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 12px;
    }

    .player-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }

    .player-card {
      background: rgba(0,0,0,0.25);
      padding: 15px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.25);
    }

    .player-card label {
      display: block;
      font-size: 13px;
      margin: 8px 0 5px;
      color: #ddd;
    }

    .table-wrapper {
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 850px;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th,
    td {
      border: 1px solid rgba(255,255,255,0.25);
      padding: 9px;
      text-align: center;
    }

    th {
      background: rgba(0,224,213,0.25);
      text-transform: uppercase;
      font-size: 13px;
      letter-spacing: 1px;
    }

    td {
      background: rgba(0,0,0,0.25);
    }

    td input,
    td select {
      text-align: center;
    }

    .buttons {
      text-align: center;
      margin: 20px 0 40px;
    }

    button {
      padding: 12px 22px;
      border: none;
      border-radius: 8px;
      background: #00e0d5;
      color: #111;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
      margin: 5px;
    }

    button:hover {
      background: #00fff2;
    }

    .danger-button {
      background: #ff4d6d;
      color: white;
    }

    .danger-button:hover {
      background: #ff6f89;
    }

    .small-danger {
      padding: 7px 10px;
      background: #ff4d6d;
      color: white;
      font-size: 12px;
    }

    @media (max-width: 700px) {
      header h1 {
        font-size: 25px;
      }

      .tabs,
      .player-grid {
        grid-template-columns: 1fr;
        flex-direction: column;
      }

      .bracket-wrapper {
        padding: 15px;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>Road to Final</h1>
    <p>Joel vs Joshua FIFA Tournament</p>
    <div class="trophy">🏆</div>
  </header>

  <div class="tabs">
    <button class="tab-button active" onclick="openTab('tournamentTab', this)">Tournament Bracket</button>
    <button class="tab-button" onclick="openTab('scorerTab', this)">Top Scorers</button>
  </div>

  <div id="tournamentTab" class="tab-content active">

    <div class="bracket-wrapper">
      <div class="bracket">

        <div class="round">
          <h2>Quarter Finals</h2>

          <div class="match">
            <div class="team-row"><span class="team-icon" id="icon-team1"></span><select id="team1" onchange="updateIcon('team1')"></select></div>
            <div class="team-row"><span class="team-icon" id="icon-team2"></span><select id="team2" onchange="updateIcon('team2')"></select></div>
          </div>

          <div class="match">
            <div class="team-row"><span class="team-icon" id="icon-team3"></span><select id="team3" onchange="updateIcon('team3')"></select></div>
            <div class="team-row"><span class="team-icon" id="icon-team4"></span><select id="team4" onchange="updateIcon('team4')"></select></div>
          </div>

          <div class="match">
            <div class="team-row"><span class="team-icon" id="icon-team5"></span><select id="team5" onchange="updateIcon('team5')"></select></div>
            <div class="team-row"><span class="team-icon" id="icon-team6"></span><select id="team6" onchange="updateIcon('team6')"></select></div>
          </div>

          <div class="match">
            <div class="team-row"><span class="team-icon" id="icon-team7"></span><select id="team7" onchange="updateIcon('team7')"></select></div>
            <div class="team-row"><span class="team-icon" id="icon-team8"></span><select id="team8" onchange="updateIcon('team8')"></select></div>
          </div>
        </div>

        <div class="round">
          <h2>Semi Finalists</h2>

          <div class="match">
            <div class="team-row"><span class="team-icon" id="icon-semi1"></span><select id="semi1" onchange="updateIcon('semi1')"></select></div>
            <div class="team-row"><span class="team-icon" id="icon-semi2"></span><select id="semi2" onchange="updateIcon('semi2')"></select></div>
          </div>

          <div class="match">
            <div class="team-row"><span class="team-icon" id="icon-semi3"></span><select id="semi3" onchange="updateIcon('semi3')"></select></div>
            <div class="team-row"><span class="team-icon" id="icon-semi4"></span><select id="semi4" onchange="updateIcon('semi4')"></select></div>
          </div>
        </div>

        <div class="center-area">
          <div class="final-box">
            <h2>Final</h2>
            <div class="team-row"><span class="team-icon" id="icon-final1"></span><select id="final1" onchange="updateIcon('final1')"></select></div>
            <div class="team-row"><span class="team-icon" id="icon-final2"></span><select id="final2" onchange="updateIcon('final2')"></select></div>
          </div>

          <div class="champion">
            <h2>Champion</h2>
            <div class="team-row"><span class="team-icon" id="icon-champion"></span><select id="champion" onchange="updateIcon('champion')"></select></div>
          </div>
        </div>

        <div class="round">
          <h2>Finalists</h2>

          <div class="match">
            <div class="team-row"><span class="team-icon" id="icon-finalist1"></span><select id="finalist1" onchange="updateIcon('finalist1')"></select></div>
          </div>

          <div class="match">
            <div class="team-row"><span class="team-icon" id="icon-finalist2"></span><select id="finalist2" onchange="updateIcon('finalist2')"></select></div>
          </div>
        </div>

        <div class="round">
          <h2>Scores</h2>
          <div class="match"><input id="score1" placeholder="Quarter Final Scores" oninput="saveData()" /></div>
          <div class="match"><input id="score2" placeholder="Semi Final Scores" oninput="saveData()" /></div>
          <div class="match"><input id="score3" placeholder="Final Score" oninput="saveData()" /></div>
        </div>

      </div>
    </div>

    <section class="player-section">
      <h2>Players and Teams</h2>

      <div class="player-grid">
        <div class="player-card">
          <h3>Player 1</h3>
          <label>Player Name</label>
          <input id="player1Name" value="Joel" oninput="saveData()" />

          <label>Team Picked</label>
          <input id="player1Team" placeholder="Example: Argentina, Real Madrid..." oninput="saveData()" />
        </div>

        <div class="player-card">
          <h3>Player 2</h3>
          <label>Player Name</label>
          <input id="player2Name" value="Joshua" oninput="saveData()" />

          <label>Team Picked</label>
          <input id="player2Team" placeholder="Example: France, Barcelona..." oninput="saveData()" />
        </div>
      </div>
    </section>

  </div>

  <div id="scorerTab" class="tab-content">
    <section class="scorer-section">
      <h2>Top Scorer List</h2>

      <div class="buttons" style="margin-bottom: 15px;">
        <button onclick="addScorerRow()">Add Scorer</button>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Rank</th>
              <th>Scorer Name</th>
              <th>Team</th>
              <th>Goals</th>
              <th>Owned By</th>
              <th>Remove</th>
            </tr>
          </thead>
          <tbody id="scorerTableBody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <div class="buttons">
    <button onclick="saveData()">Save Tournament</button>
    <button class="danger-button" onclick="resetTournament()">Reset</button>
  </div>

  <script>
    const teams = [
      { name: "Select Team", type: "none", icon: "⚽" },

      // International teams
      { name: "Argentina", type: "country", code: "AR" },
      { name: "Australia", type: "country", code: "AU" },
      { name: "Austria", type: "country", code: "AT" },
      { name: "Belgium", type: "country", code: "BE" },
      { name: "Brazil", type: "country", code: "BR" },
      { name: "Canada", type: "country", code: "CA" },
      { name: "Chile", type: "country", code: "CL" },
      { name: "Colombia", type: "country", code: "CO" },
      { name: "Croatia", type: "country", code: "HR" },
      { name: "Czech Republic", type: "country", code: "CZ" },
      { name: "Denmark", type: "country", code: "DK" },
      { name: "Ecuador", type: "country", code: "EC" },
      { name: "England", type: "country", icon: "🏴" },
      { name: "France", type: "country", code: "FR" },
      { name: "Germany", type: "country", code: "DE" },
      { name: "Ghana", type: "country", code: "GH" },
      { name: "Italy", type: "country", code: "IT" },
      { name: "Japan", type: "country", code: "JP" },
      { name: "Mexico", type: "country", code: "MX" },
      { name: "Morocco", type: "country", code: "MA" },
      { name: "Netherlands", type: "country", code: "NL" },
      { name: "Norway", type: "country", code: "NO" },
      { name: "Poland", type: "country", code: "PL" },
      { name: "Portugal", type: "country", code: "PT" },
      { name: "Scotland", type: "country", icon: "🏴󠁧󠁢󠁳󠁣󠁴󠁿" },
      { name: "Senegal", type: "country", code: "SN" },
      { name: "South Korea", type: "country", code: "KR" },
      { name: "Spain", type: "country", code: "ES" },
      { name: "Sweden", type: "country", code: "SE" },
      { name: "Switzerland", type: "country", code: "CH" },
      { name: "Turkey", type: "country", code: "TR" },
      { name: "Uruguay", type: "country", code: "UY" },
      { name: "USA", type: "country", code: "US" },
      { name: "Wales", type: "country", icon: "🏴󠁧󠁢󠁷󠁬󠁳󠁿" },

      // Top club teams
      { name: "Real Madrid", type: "club", logo: "https://logo.clearbit.com/realmadrid.com" },
      { name: "Barcelona", type: "club", logo: "https://logo.clearbit.com/fcbarcelona.com" },
      { name: "Manchester City", type: "club", logo: "https://logo.clearbit.com/mancity.com" },
      { name: "Liverpool", type: "club", logo: "https://logo.clearbit.com/liverpoolfc.com" },
      { name: "Manchester United", type: "club", logo: "https://logo.clearbit.com/manutd.com" },
      { name: "Chelsea", type: "club", logo: "https://logo.clearbit.com/chelseafc.com" },
      { name: "Arsenal", type: "club", logo: "https://logo.clearbit.com/arsenal.com" },
      { name: "Tottenham", type: "club", logo: "https://logo.clearbit.com/tottenhamhotspur.com" },
      { name: "Bayern Munich", type: "club", logo: "https://logo.clearbit.com/fcbayern.com" },
      { name: "Borussia Dortmund", type: "club", logo: "https://logo.clearbit.com/bvb.de" },
      { name: "PSG", type: "club", logo: "https://logo.clearbit.com/psg.fr" },
      { name: "Inter Milan", type: "club", logo: "https://logo.clearbit.com/inter.it" },
      { name: "AC Milan", type: "club", logo: "https://logo.clearbit.com/acmilan.com" },
      { name: "Juventus", type: "club", logo: "https://logo.clearbit.com/juventus.com" },
      { name: "Napoli", type: "club", logo: "https://logo.clearbit.com/sscnapoli.it" },
      { name: "Atletico Madrid", type: "club", logo: "https://logo.clearbit.com/atleticodemadrid.com" },
      { name: "Bayer Leverkusen", type: "club", logo: "https://logo.clearbit.com/bayer04.de" },
      { name: "RB Leipzig", type: "club", logo: "https://logo.clearbit.com/rbleipzig.com" },
      { name: "Ajax", type: "club", logo: "https://logo.clearbit.com/ajax.nl" },
      { name: "Benfica", type: "club", logo: "https://logo.clearbit.com/slbenfica.pt" },
      { name: "Porto", type: "club", logo: "https://logo.clearbit.com/fcporto.pt" },
      { name: "Sporting CP", type: "club", logo: "https://logo.clearbit.com/sporting.pt" },
      { name: "Roma", type: "club", logo: "https://logo.clearbit.com/asroma.com" },
      { name: "Lazio", type: "club", logo: "https://logo.clearbit.com/sslazio.it" },
      { name: "Newcastle United", type: "club", logo: "https://logo.clearbit.com/newcastleunited.com" },
      { name: "Aston Villa", type: "club", logo: "https://logo.clearbit.com/avfc.co.uk" },
      { name: "West Ham", type: "club", logo: "https://logo.clearbit.com/whufc.com" },
      { name: "Sevilla", type: "club", logo: "https://logo.clearbit.com/sevillafc.es" },
      { name: "Villarreal", type: "club", logo: "https://logo.clearbit.com/villarrealcf.es" },
      { name: "Al Nassr", type: "club", logo: "https://logo.clearbit.com/alnassr.sa" }
    ];

    const bracketSelectIds = [
      "team1", "team2", "team3", "team4", "team5", "team6", "team7", "team8",
      "semi1", "semi2", "semi3", "semi4",
      "final1", "final2",
      "champion",
      "finalist1", "finalist2"
    ];

    const inputIds = [
      "score1", "score2", "score3",
      "player1Name", "player1Team",
      "player2Name", "player2Team"
    ];

    let scorers = [];

    function openTab(tabId, button) {
      document.querySelectorAll(".tab-content").forEach(tab => tab.classList.remove("active"));
      document.querySelectorAll(".tab-button").forEach(btn => btn.classList.remove("active"));
      document.getElementById(tabId).classList.add("active");
      button.classList.add("active");
    }

    function countryCodeToFlag(code) {
      return code
        .toUpperCase()
        .replace(/./g, char => String.fromCodePoint(127397 + char.charCodeAt()));
    }

    function getTeamIcon(teamName) {
      const team = teams.find(t => t.name === teamName);

      if (!team) return "⚽";

      if (team.logo) {
        return `<img src="${team.logo}" onerror="this.outerHTML='⚽'" alt="${team.name} logo">`;
      }

      if (team.code) {
        return countryCodeToFlag(team.code);
      }

      return team.icon || "⚽";
    }

    function fillSelect(select) {
      select.innerHTML = "";

      const internationalGroup = document.createElement("optgroup");
      internationalGroup.label = "International Teams";

      const clubGroup = document.createElement("optgroup");
      clubGroup.label = "Club Teams";

      teams.forEach(team => {
        const option = document.createElement("option");
        option.value = team.name;

        if (team.logo) {
          option.textContent = `⚽ ${team.name}`;
        } else if (team.code) {
          option.textContent = `${countryCodeToFlag(team.code)} ${team.name}`;
        } else {
          option.textContent = `${team.icon || "⚽"} ${team.name}`;
        }

        if (team.type === "club") {
          clubGroup.appendChild(option);
        } else {
          internationalGroup.appendChild(option);
        }
      });

      select.appendChild(internationalGroup);
      select.appendChild(clubGroup);
    }

    function fillDropdowns() {
      bracketSelectIds.forEach(id => {
        const select = document.getElementById(id);
        fillSelect(select);
      });
    }

    function updateIcon(id) {
      const selectedTeam = document.getElementById(id).value;
      const icon = document.getElementById(`icon-${id}`);

      if (icon) {
        icon.innerHTML = getTeamIcon(selectedTeam);
      }

      saveData();
    }

    function addScorerRow(savedScorer = null) {
      scorers.push(savedScorer || {
        name: "",
        team: "Select Team",
        goals: "",
        owner: ""
      });

      renderScorers();
      saveData();
    }

    function deleteScorerRow(index) {
      scorers.splice(index, 1);
      renderScorers();
      saveData();
    }

    function updateScorer(index, field, value) {
      scorers[index][field] = value;
      saveData();

      if (field === "team") {
        const icon = document.getElementById(`icon-scorer-${index}`);
        if (icon) {
          icon.innerHTML = getTeamIcon(value);
        }
      }
    }

    function renderScorers() {
      const tbody = document.getElementById("scorerTableBody");
      tbody.innerHTML = "";

      scorers.forEach((scorer, index) => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${index + 1}</td>

          <td>
            <input
              value="${scorer.name || ""}"
              placeholder="Example: Mbappe"
              oninput="updateScorer(${index}, 'name', this.value)"
            />
          </td>

          <td>
            <div class="team-row">
              <span class="team-icon" id="icon-scorer-${index}">${getTeamIcon(scorer.team)}</span>
              <select onchange="updateScorer(${index}, 'team', this.value)"></select>
            </div>
          </td>

          <td>
            <input
              type="number"
              min="0"
              value="${scorer.goals || ""}"
              placeholder="0"
              oninput="updateScorer(${index}, 'goals', this.value)"
            />
          </td>

          <td>
            <input
              value="${scorer.owner || ""}"
              placeholder="Joel or Joshua"
              oninput="updateScorer(${index}, 'owner', this.value)"
            />
          </td>

          <td>
            <button class="small-danger" onclick="deleteScorerRow(${index})">Delete</button>
          </td>
        `;

        const select = tr.querySelector("select");
        fillSelect(select);
        select.value = scorer.team || "Select Team";

        tbody.appendChild(tr);
      });
    }

    function saveData() {
      const data = {
        scorers: scorers
      };

      bracketSelectIds.forEach(id => {
        const element = document.getElementById(id);
        if (element) data[id] = element.value;
      });

      inputIds.forEach(id => {
        const element = document.getElementById(id);
        if (element) data[id] = element.value;
      });

      localStorage.setItem("fifaTournamentData", JSON.stringify(data));
    }

    function loadData() {
      const saved = localStorage.getItem("fifaTournamentData");

      if (!saved) {
        setDefaultTeams();
        scorers = [
          { name: "", team: "Select Team", goals: "", owner: "" },
          { name: "", team: "Select Team", goals: "", owner: "" },
          { name: "", team: "Select Team", goals: "", owner: "" },
          { name: "", team: "Select Team", goals: "", owner: "" },
          { name: "", team: "Select Team", goals: "", owner: "" }
        ];
        renderScorers();
        saveData();
        return;
      }

      const data = JSON.parse(saved);

      bracketSelectIds.forEach(id => {
        const element = document.getElementById(id);

        if (element && data[id]) {
          element.value = data[id];
        }

        if (element) {
          updateIcon(id);
        }
      });

      inputIds.forEach(id => {
        const element = document.getElementById(id);

        if (element && data[id] !== undefined) {
          element.value = data[id];
        }
      });

      scorers = data.scorers || [];
      if (scorers.length === 0) {
        scorers = [
          { name: "", team: "Select Team", goals: "", owner: "" },
          { name: "", team: "Select Team", goals: "", owner: "" },
          { name: "", team: "Select Team", goals: "", owner: "" }
        ];
      }

      renderScorers();
    }

    function setDefaultTeams() {
      const defaults = {
        team1: "Argentina",
        team2: "Brazil",
        team3: "France",
        team4: "Portugal",
        team5: "England",
        team6: "Spain",
        team7: "Real Madrid",
        team8: "Barcelona",
        player1Name: "Joel",
        player2Name: "Joshua"
      };

      Object.keys(defaults).forEach(id => {
        const element = document.getElementById(id);
        if (element) element.value = defaults[id];
      });

      bracketSelectIds.forEach(id => updateIcon(id));
    }

    function resetTournament() {
      if (confirm("Reset the whole tournament and top scorer list?")) {
        localStorage.removeItem("fifaTournamentData");

        bracketSelectIds.forEach(id => {
          const element = document.getElementById(id);
          if (element) {
            element.value = "Select Team";
            updateIcon(id);
          }
        });

        inputIds.forEach(id => {
          const element = document.getElementById(id);
          if (element) element.value = "";
        });

        document.getElementById("player1Name").value = "Joel";
        document.getElementById("player2Name").value = "Joshua";

        scorers = [
          { name: "", team: "Select Team", goals: "", owner: "" },
          { name: "", team: "Select Team", goals: "", owner: "" },
          { name: "", team: "Select Team", goals: "", owner: "" }
        ];

        renderScorers();
        saveData();
      }
    }

    fillDropdowns();
    loadData();
  </script>

</body>
</html>
